<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salem — Portfolio</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Hubot+Sans&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap&family=Loved+by+the+King&family=Bubbler+One" rel="stylesheet">

  <!-- Tailwind theme config (must come BEFORE first Tailwind usage) -->
  <script src="tailwind.config.js"></script>

  <!-- Site styles -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="min-h-screen">

<!-- ═══════════ NAVBAR ═══════════ -->
<nav class="sticky top-0 z-50 flex items-center justify-between px-6 h-16
            rounded-[50px] mx-4 mt-4
            bg-[#1E1E1E] backdrop-blur-md border border-border shadow-[0_4px_4px_rgba(0,0,0,0.25)]">

  <span class="text-3xl leading-none select-none
               drop-shadow-[0_0_8px_rgba(232,133,10,0.5)]
               hover:rotate-12 hover:scale-110 transition-transform duration-300 cursor-default">🌻</span>

  <span class="font-display text-accent2 tracking-widest text-sm md:text-lg">How was your day?</span>

  <span class="text-3xl leading-none select-none
               drop-shadow-[0_0_8px_rgba(232,133,10,0.5)]
               hover:-rotate-12 hover:scale-110 transition-transform duration-300 cursor-default">🌻</span>
</nav>


<!-- ═══════════ MAIN ═══════════ -->
<main class="max-w-5xl mx-auto px-4 md:px-6 py-8 md:py-10 flex flex-col gap-5">


  <!-- ══════════════════════════════════════════
       HERO SECTION
       Desktop : [photo | info | edu+lang]
       Mobile  : [photo | info] → social strip → [edu | lang]
  ══════════════════════════════════════════ -->
  <section class="animate-fade-up" id="profilePic">

    <!-- 3-col desktop / 2-col mobile grid -->
    <div class="grid grid-cols-2 md:grid-cols-3 gap-x-5 md:gap-x-7 gap-y-4 items-start">

      <!-- ── LEFT COL: Photo ── -->
      <div class="flex flex-col gap-3">
        <div class="w-[150px] md:w-[273px] h-[170px] md:h-[313px] rounded-[18px] md:rounded-[23px]
                    overflow-hidden border border-border
                    shadow-[0_8px_32px_rgba(0,0,0,0.5)] bg-surface3 flex-shrink-0">
          <img id="profile-photo" src="" alt="Salem"
               class="profile-img" loading="eager">
        </div>
      </div>
      <!-- /LEFT COL -->

      <!-- ── MIDDLE COL: Hero text ── -->
      <div class="pt-1 md:pt-2">
        <p class="font-hi hi text-accent md:text-xl leading-tight">Hi !</p>
        <h1 class="font-hubot i_am text-3xl md:text-5xl leading-tight mb-1">
          l am <span class="salem">Salem</span>
        </h1>
        <p class="text-muted text-xs md:text-sm mb-4 md:mb-6 font-light">
          software engineer | research enthusiast
        </p>
        <a href="mailto:salem@example.com"
           class="inline-block bg-accent hover:bg-accent2 text-black font-bold text-sm
                  px-5 py-2 
                  
                  hover:shadow-[0_6px_20px_rgba(232,133,10,0.5)]
                  hover:-translate-y-0.5 transition-all duration-200">
          Email
        </a>
      </div>
      <!-- /MIDDLE COL -->

      <!-- ── MOBILE SOCIAL STRIP (col-span-2, below photo+info row) ── -->
      <div class="flex md:hidden col-span-2 flex-wrap gap-2 justify-evenly mt-2"
           id="social-mobile"></div>

      <!-- ── RIGHT COL: Education + Languages — DESKTOP ONLY ── -->
      <div class="hidden md:flex flex-col gap-3">

        <!-- Education card -->
        <div class="bg-surface border border-border rounded-xl p-4">
          <h2 class="section-title mb-2">Education</h2>
          <table class="education-table" id="edu-desktop"></table>
        </div>

        <!-- Languages card -->
        <div class="bg-surface border border-border rounded-xl p-4">
          <h2 class="section-title mb-2">Languages</h2>
          <div class="flex flex-col gap-2" id="langs-desktop"></div>
        </div>

      </div>
      <!-- /RIGHT COL -->

    </div>
    <!-- /3-col grid -->

    <!-- ── DESKTOP SOCIAL STRIP (full bar below hero grid) ── -->
    <div class="hidden md:flex items-center justify-evenly flex-wrap gap-6
                mt-5 bg-surface border border-border rounded-xl py-3 px-6"
         id="social-desktop"></div>

  </section>
  <!-- /HERO -->


  <!-- ══════════════════════════════════════════
       MOBILE: Education + Languages side-by-side
  ══════════════════════════════════════════ -->
  <div class="flex md:hidden gap-3 animate-fade-up-1">

    <!-- Education — 2/3 -->
    <div class="bg-surface border border-border rounded-xl p-3 flex-[2]">
      <h2 class="section-title mb-2" style="font-size:0.7rem;">Education</h2>
      <table class="education-table" id="edu-mobile"
             style="font-size:0.65rem;"></table>
    </div>

    <!-- Languages — 1/3 -->
    <div class="bg-surface border border-border rounded-xl p-3 flex-[1]">
      <h2 class="section-title mb-2" style="font-size:0.7rem;">Languages</h2>
      <div class="flex flex-col gap-1.5" id="langs-mobile"></div>
    </div>

  </div>
  <!-- /MOBILE edu + lang -->


  <!-- ══════════════════════════════════════════
       SKILLS
  ══════════════════════════════════════════ -->
  <section class="bg-surface border border-border rounded-xl p-4 md:p-5 animate-fade-up-2">
    <h2 class="section-title mb-2">Skills</h2>
    <div class="grid grid-cols-5 gap-2 md:gap-3" id="skills-grid"></div>
  </section>


  <!-- ══════════════════════════════════════════
       AWARDS + EXPERIENCES
  ══════════════════════════════════════════ -->
  <div class="grid grid-cols-1 md:grid-cols-[1fr_1.6fr] gap-4 animate-fade-up-3">

    <!-- Awards -->
    <div class="bg-surface border border-border rounded-xl p-4 md:p-5">
      <h2 class="section-title mb-2">Awards</h2>
      <div class="flex flex-col gap-2" id="awards-list"></div>
    </div>

    <!-- Experiences -->
    <div class="bg-surface border border-border rounded-xl p-4 md:p-5">
      <h2 class="section-title mb-2">Experiences</h2>
      <div class="flex flex-col gap-2.5" id="experiences"></div>
    </div>

  </div>


  <!-- ══════════════════════════════════════════
       PROJECTS
  ══════════════════════════════════════════ -->
  <section class="bg-surface border border-border rounded-xl p-4 md:p-5 animate-fade-up-4">
    <h2 class="section-title mb-2">Projects</h2>
    <div class="grid grid-cols-2 gap-3 md:gap-4" id="projects-grid"></div>
  </section>


</main>

<script src="script.js"></script>
</body>
</html>
